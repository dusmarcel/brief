<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bundestagsabgeordnete nach Ort oder PLZ</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="header">
        <h1>Ort oder PLZ → Bundestagsabgeordnete</h1>
        <p>Suche nach PLZ, Stadt, Gemeinde, Landkreis oder Bundesland und wähle bei Bedarf den passenden Vorschlag aus.</p>
      </header>

      <form id="search-form" class="search-form">
        <label for="search-query">Ort, Landkreis, Bundesland oder PLZ</label>
        <div class="input-row">
          <input id="search-query" name="q" autocomplete="off" placeholder="z. B. 10435, Wesel, Kreis Wesel oder Hessen" title="PLZ, Stadt, Gemeinde, Landkreis oder Bundesland eingeben" />
          <input id="search-target" name="target" type="hidden" />
          <button type="submit">Suchen</button>
        </div>
        <div id="suggestions" class="suggestions" hidden></div>
      </form>

      <section id="status" class="status" aria-live="polite"></section>
      <section id="result" class="result-list"></section>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
